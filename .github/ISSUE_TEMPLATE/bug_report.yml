name: Bug report
description: Report a reproducible problem in praetor
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please provide enough detail to reproduce the issue. Include the exact command and provider.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the bug
      placeholder: "CLI exits with unknown provider even when --provider codex is set"
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Provider
      description: Which provider path is affected?
      options:
        - codex
        - claude
        - orchestrator/core
        - not sure
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command
      description: Exact command used
      placeholder: 'praetor run --provider codex --prompt "Reply with OK"'
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps, including environment and inputs
      placeholder: |
        1. Build with `go build ./cmd/praetor`
        2. Run the command shown above
        3. Observe stderr and exit code
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "The command should return a valid response and exit with code 0."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: "The command exits with code 1 and prints an unexpected provider error."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs, stack traces, or screenshots
      render: shell

  - type: input
    id: praetor_version
    attributes:
      label: Praetor version
      placeholder: "v0.1.0 or commit SHA"
    validations:
      required: true

  - type: input
    id: go_version
    attributes:
      label: Go version
      placeholder: "go1.26.x"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Ubuntu 24.04 / macOS 15 / Windows 11"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this on the latest main branch.
          required: false
