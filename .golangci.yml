version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - whitespace
  settings:
    gosec:
      excludes:
        - G117 # APIKey field name is expected in provider options.
        - G204 # This CLI must execute external tools (git, tmux, codex, claude).
        - G301 # Runtime directories are operational data, not secret storage.
        - G304 # File paths are intentionally dynamic (plans, state, logs).
        - G306 # Runtime files are meant to be readable during operations.

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
