version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - whitespace
  settings:
    gosec:
      excludes:
        - G117
        - G204
        - G301
        - G304
        - G306
        - G401
        - G505

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
